    #to_top_scrollup{font-size:40px;width:40px;height:40px;background-color:#0083ff;}

    /* ===== PAGE CV ===== */
    .cv-page{max-width:1200px;margin:0 auto;padding:40px 20px 80px;}

    /* BREADCRUMB */
    .cv-bread{display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8;margin-bottom:36px;flex-wrap:wrap;}
    .cv-bread a{color:#64748b;text-decoration:none;}
    .cv-bread a:hover{color:#2872fa;}
    .cv-bread-sep{color:#cbd5e1;}
    .cv-bread span{color:#2872fa;font-weight:700;}

    /* ===== HERO ===== */
    .cv-hero{
      background:linear-gradient(145deg,#0a1628 0%,#112044 50%,#0a1628 100%);
      border-radius:28px;
      padding:52px 56px;
      margin-bottom:36px;
      position:relative;overflow:hidden;
      box-shadow:0 16px 52px rgba(15,23,42,0.12);
      display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;
    }

    .cv-hero::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(circle at 85% 20%,rgba(40,114,250,0.2) 0%,transparent 45%),
        radial-gradient(circle at 10% 85%,rgba(99,102,241,0.1) 0%,transparent 40%);
      pointer-events:none;
    }

    .cv-hero::after{
      content:'';position:absolute;inset:0;
      background-image:radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px);
      background-size:28px 28px;
      pointer-events:none;
    }

    .cv-hero-left{position:relative;z-index:1;}

    .cv-hero-chip{
      display:inline-flex;align-items:center;gap:8px;
      background:rgba(40,114,250,0.18);border:1px solid rgba(40,114,250,0.35);
      color:#93c5fd;font-size:11px;font-weight:700;
      padding:5px 14px;border-radius:999px;margin-bottom:18px;
      text-transform:uppercase;letter-spacing:.07em;width:fit-content;
    }

    .cv-hero h1{
      margin:0 0 12px;
      font-size:clamp(28px,3.5vw,48px);
      color:#fff;font-weight:800;letter-spacing:-0.025em;line-height:1.1;
    }

    .cv-hero h1 em{
      font-style:normal;
      background:linear-gradient(90deg,#60a5fa,#a5b4fc);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    .cv-hero p{margin:0;color:#64748b;font-size:15px;line-height:1.7;max-width:500px;}

    .cv-hero-btns{
      position:relative;z-index:1;
      display:flex;flex-direction:column;gap:12px;flex-shrink:0;
    }

    .cv-btn-primary{
      display:inline-flex;align-items:center;gap:10px;
      padding:14px 24px;border-radius:14px;
      font-size:14px;font-weight:800;color:#fff;
      background:linear-gradient(135deg,#2872fa,#3e3960);
      box-shadow:0 8px 24px rgba(40,114,250,0.28);
      text-decoration:none;
      transition:transform .15s,box-shadow .15s;
      white-space:nowrap;
    }

    .cv-btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(40,114,250,0.38);}
    .cv-btn-primary svg{width:16px;height:16px;}

    .cv-btn-secondary{
      display:inline-flex;align-items:center;gap:10px;
      padding:13px 24px;border-radius:14px;
      font-size:14px;font-weight:700;
      color:rgba(255,255,255,0.75);
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      text-decoration:none;
      transition:background .15s,border-color .15s;
      white-space:nowrap;
    }

    .cv-btn-secondary:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2);}
    .cv-btn-secondary svg{width:16px;height:16px;}

    @media(max-width:700px){.cv-hero{padding:36px 24px;}.cv-hero-btns{flex-direction:row;flex-wrap:wrap;}}

    /* ===== LAYOUT CV ===== */
    .cv-layout{
      display:grid;
      grid-template-columns:300px 1fr;
      gap:24px;
      align-items:start;
    }
    @media(max-width:900px){.cv-layout{grid-template-columns:1fr;}}

    /* ===== SIDEBAR ===== */
    .cv-sidebar{display:flex;flex-direction:column;gap:20px;}

    .cv-sc{
      background:#ffffff;
      border-radius:20px;
      border:1px solid rgba(15,23,42,0.07);
      box-shadow:0 6px 22px rgba(15,23,42,0.05);
      padding:24px;
    }

    .cv-sc-title{
      font-size:12px;font-weight:800;color:#0f172a;
      text-transform:uppercase;letter-spacing:.07em;
      display:flex;align-items:center;gap:8px;
      margin-bottom:18px;
    }

    .cv-sc-title-dot{width:7px;height:7px;border-radius:50%;background:#2872fa;}

    /* photo placeholder */
    .cv-photo{
      width:96px;height:96px;border-radius:50%;
      background:linear-gradient(135deg,#2872fa,#3e3960);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 16px;
      font-size:32px;font-weight:900;color:#fff;
      letter-spacing:-1px;
      border:3px solid rgba(40,114,250,0.2);
      overflow:hidden;
    }

    .cv-photo img{width:100%;height:100%;object-fit:cover;}

    .cv-identity{text-align:center;margin-bottom:18px;}
    .cv-identity-name{font-size:17px;font-weight:800;color:#0f172a;}
    .cv-identity-title{font-size:13px;color:#2872fa;font-weight:700;margin-top:3px;}
    .cv-identity-sub{font-size:12px;color:#64748b;margin-top:2px;}

    /* infos contact sidebar */
    .cv-contact-row{
      display:flex;align-items:center;gap:10px;
      font-size:13px;color:#334155;padding:8px 0;
      border-bottom:1px solid rgba(15,23,42,0.05);
    }
    .cv-contact-row:last-child{border-bottom:none;}
    .cv-contact-ico{
      width:30px;height:30px;border-radius:8px;
      background:rgba(40,114,250,0.08);color:#2872fa;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .cv-contact-ico svg{width:14px;height:14px;}
    .cv-contact-val{font-size:12px;word-break:break-all;}

    /* compétences barres */
    .cv-sk{margin-bottom:14px;}
    .cv-sk:last-child{margin-bottom:0;}
    .cv-sk label{display:flex;justify-content:space-between;font-size:12px;color:#334155;font-weight:700;margin-bottom:5px;}
    .cv-sk-bar{height:5px;background:#e2e8f0;border-radius:999px;overflow:hidden;}
    .cv-sk-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#2872fa,#60a5fa);}

    /* langues */
    .cv-lang{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(15,23,42,0.05);font-size:13px;}
    .cv-lang:last-child{border-bottom:none;}
    .cv-lang-name{font-weight:700;color:#0f172a;}
    .cv-lang-level{
      font-size:11px;font-weight:700;
      padding:3px 10px;border-radius:999px;
    }
    .cv-lang-level.native{background:#eff6ff;color:#2872fa;border:1px solid rgba(40,114,250,0.18);}
    .cv-lang-level.pro{background:#f0fdf4;color:#16a34a;border:1px solid rgba(22,163,74,0.18);}
    .cv-lang-level.school{background:#fefce8;color:#ca8a04;border:1px solid rgba(202,138,4,0.18);}

    /* hobbies */
    .cv-hobbies{display:flex;flex-wrap:wrap;gap:8px;}
    .cv-hobby{
      display:flex;align-items:center;gap:6px;
      padding:6px 12px;border-radius:999px;
      background:#f1f5f9;color:#475569;
      font-size:12px;font-weight:700;
      border:1px solid rgba(15,23,42,0.07);
    }

    /* ===== CORPS DU CV ===== */
    .cv-main{display:flex;flex-direction:column;gap:20px;}

    .cv-card{
      background:#ffffff;
      border-radius:22px;
      border:1px solid rgba(15,23,42,0.07);
      box-shadow:0 6px 22px rgba(15,23,42,0.05);
      padding:28px 32px;
    }

    .cv-card-head{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
    .cv-card-ico{
      width:44px;height:44px;border-radius:13px;
      background:rgba(40,114,250,0.08);color:#2872fa;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .cv-card-ico svg{width:20px;height:20px;}
    .cv-card h2{margin:0;font-size:17px;font-weight:800;color:#0f172a;}
    .cv-bar{width:44px;height:3px;background:linear-gradient(90deg,#2872fa,rgba(40,114,250,0.1));border-radius:999px;margin:8px 0 20px;}

    /* timeline */
    .cv-timeline{display:flex;flex-direction:column;gap:0;position:relative;}

    .cv-timeline::before{
      content:'';position:absolute;
      left:19px;top:8px;bottom:8px;width:2px;
      background:linear-gradient(180deg,#2872fa,rgba(40,114,250,0.08));
      border-radius:999px;
    }

    .cv-tl{display:flex;gap:22px;padding-bottom:22px;}
    .cv-tl:last-child{padding-bottom:0;}

    .cv-tl-dot-col{flex-shrink:0;width:40px;display:flex;justify-content:center;padding-top:3px;}
    .cv-tl-dot{
      width:12px;height:12px;border-radius:50%;
      background:#2872fa;border:3px solid #fff;
      box-shadow:0 0 0 2px #2872fa;
      position:relative;z-index:1;
    }

    .cv-tl-body{flex:1;}

    .cv-tl-period{
      display:inline-flex;align-items:center;gap:6px;
      font-size:11px;font-weight:700;color:#2872fa;
      background:rgba(40,114,250,0.08);border:1px solid rgba(40,114,250,0.15);
      padding:3px 10px;border-radius:999px;
      margin-bottom:6px;
    }

    .cv-tl-title{font-size:15px;font-weight:800;color:#0f172a;margin-bottom:2px;}
    .cv-tl-sub{font-size:13px;color:#2872fa;font-weight:700;margin-bottom:6px;}
    .cv-tl-desc{font-size:13px;color:#475569;line-height:1.65;margin:0;}

    .cv-tl-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .cv-tl-tag{
      font-size:11px;font-weight:700;
      padding:3px 10px;border-radius:999px;
      background:#f1f5f9;color:#475569;
      border:1px solid rgba(15,23,42,0.08);
    }

    /* objectif pro */
    .cv-goal{
      background:linear-gradient(135deg,#eff6ff,#eef2ff);
      border:1px solid rgba(40,114,250,0.14);
      border-radius:16px;
      padding:20px 22px;
      display:flex;align-items:flex-start;gap:14px;
    }

    .cv-goal-ico{
      width:44px;height:44px;border-radius:12px;
      background:rgba(40,114,250,0.12);color:#2872fa;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }
    .cv-goal-ico svg{width:20px;height:20px;}
    .cv-goal-title{font-size:13px;font-weight:800;color:#0f172a;margin-bottom:4px;}
    .cv-goal-text{font-size:13px;color:#475569;line-height:1.6;margin:0;}
  </style>
